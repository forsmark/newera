services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - jobs-db:/app/db
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      - DB_PATH=/app/db/jobs.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  jobs-db:
