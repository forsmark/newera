services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data:ro
      - ./db:/app/db
      - ./backups:/app/backups
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
